<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#1a1a2e"/>
  
  <!-- Note paper -->
  <rect x="7" y="5" width="18" height="22" rx="2" fill="#f5f0e8"/>
  
  <!-- Folded corner (top right) -->
  <polygon points="19,5 25,5 25,11" fill="#1a1a2e" opacity="0.15"/>
  <polygon points="19,5 25,11 19,11" fill="#ddd5c4"/>
  <line x1="19" y1="5" x2="19" y2="11" stroke="#c8bfad" stroke-width="0.5"/>
  <line x1="19" y1="11" x2="25" y2="11" stroke="#c8bfad" stroke-width="0.5"/>
  
  <!-- Lines on the note -->
  <line x1="10" y1="14" x2="22" y2="14" stroke="#b0a898" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="10" y1="17.5" x2="22" y2="17.5" stroke="#b0a898" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="10" y1="21" x2="18" y2="21" stroke="#b0a898" stroke-width="1.2" stroke-linecap="round"/>
  
  <!-- Pencil -->
  <g transform="rotate(-40, 22, 22)">
    <rect x="20" y="15" width="4" height="12" rx="0.5" fill="#f5c842"/>
    <polygon points="20,27 24,27 22,31" fill="#f0a070"/>
    <rect x="20" y="15" width="4" height="2" rx="0.5" fill="#888"/>
    <line x1="22" y1="29.5" x2="22" y2="31" stroke="#2a1a0a" stroke-width="0.8" stroke-linecap="round"/>
  </g>
</svg>
